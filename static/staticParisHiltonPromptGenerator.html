<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glam Prompt Generator</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Didact+Gothic&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       STYLES
       1. CSS Variables
       2. Reset & Base
       3. Layout
       4. Typography
       5. Filter Tags
       6. Prompt Card
       7. Buttons
       8. Breakdown Panel
       9. Animations
    ============================================================ */


    /* ── 1. CSS Variables ─────────────────────────────────────── */
    :root {
      --pink:     #f472b6;
      --hot-pink: #ec4899;
      --blush:    #fce7f3;
      --gold:     #d4a843;
      --cream:    #fff9f5;
      --deep:     #1a0a10;
      --muted:    #d1b0be;
      --border:   #fce7f3;
    }


    /* ── 2. Reset & Base ──────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--cream);
      font-family: 'Didact Gothic', sans-serif;
      color: var(--deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Decorative radial gradient overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, #fce7f380 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, #fbcfe880 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }


    /* ── 3. Layout ────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .divider em {
      font-style: normal;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }


    /* ── 4. Typography ────────────────────────────────────────── */
    .crown {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--hot-pink);
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .tagline {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.5rem;
    }


    /* ── 5. Filter Tags ───────────────────────────────────────── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .tag {
      background: var(--blush);
      color: var(--hot-pink);
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
      user-select: none;
    }

    .tag:hover,
    .tag.active {
      background: var(--hot-pink);
      color: white;
    }


    /* ── 6. Prompt Card ───────────────────────────────────────── */
    .prompt-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 2rem 2.5rem;
      margin-bottom: 1.5rem;
      box-shadow:
        0 4px 30px rgba(244, 114, 182, 0.12),
        0 1px 0 rgba(212, 168, 67, 0.3) inset;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    /* Pink-to-gold gradient top border accent */
    .prompt-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--gold), var(--pink));
    }

    .prompt-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--deep);
      font-style: italic;
    }

    .placeholder-text {
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }


    /* ── 7. Buttons ───────────────────────────────────────────── */
    .generate-btn {
      background: linear-gradient(135deg, var(--hot-pink), #c026d3);
      color: white;
      border: none;
      padding: 1rem 3rem;
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 25px rgba(236, 72, 153, 0.4);
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(236, 72, 153, 0.5);
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .copy-btn {
      background: transparent;
      border: 1.5px solid var(--pink);
      color: var(--hot-pink);
      padding: 0.7rem 2rem;
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .copy-btn:hover    { background: var(--blush); }
    .copy-btn.copied   { border-color: var(--gold); color: var(--gold); }
    .copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }


    /* ── 8. Breakdown Panel ───────────────────────────────────── */
    .breakdown {
      display: none; /* shown via JS after first generate */
      text-align: left;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      font-size: 0.85rem;
      line-height: 2;
      color: #4a2030;
    }

    .breakdown-title {
      font-family: 'Playfair Display', serif;
      color: var(--hot-pink);
      font-size: 0.95rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .breakdown-key {
      color: var(--gold);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }


    /* ── 9. Animations ────────────────────────────────────────── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes shimmer {
      0%   { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .new-prompt { animation: shimmer 0.4s ease forwards; }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="crown">👑</div>
    <h1>Glam Prompt Generator</h1>
    <p class="tagline">That's hot. ✦ AI Photo Prompts</p>

    <!-- Filter tags — data-filter drives the JS logic -->
    <div class="tags" id="filterTags">
      <span class="tag active" data-filter="all">All Vibes</span>
      <span class="tag" data-filter="glam">Glam</span>
      <span class="tag" data-filter="party">Party</span>
      <span class="tag" data-filter="fashion">Fashion</span>
      <span class="tag" data-filter="y2k">Y2K</span>
      <span class="tag" data-filter="editorial">Editorial</span>
      <span class="tag" data-filter="luxury">Luxury</span>
    </div>

    <!-- Generated prompt display -->
    <div class="prompt-card" id="promptCard">
      <p class="placeholder-text">Hit generate for your first prompt ✨</p>
    </div>

    <!-- Action buttons -->
    <div class="buttons">
      <button class="generate-btn" id="generateBtn">✦ Generate Prompt</button>
      <button class="copy-btn" id="copyBtn" disabled>Copy</button>
    </div>

    <!-- Style breakdown -->
    <div class="divider">
      <span></span>
      <em>Style Breakdown</em>
      <span></span>
    </div>

    <div class="breakdown" id="breakdown"></div>

  </div>

  <script>
    /* ============================================================
       PROMPT DATA
       Each category is an array of objects with:
         - text:      the full AI image prompt string
         - breakdown: key/value pairs for the Style Breakdown panel
       To add more prompts, just push a new object into any array.
    ============================================================ */

    const PROMPTS = {

      glam: [
        {
          text: "Hyper-realistic photo of a glamorous woman, ultra-glamorous portrait, wearing a strapless pink ball gown encrusted with Swarovski crystals, Hollywood lighting, dramatic makeup with smoky eyes and glossy lips, platinum blonde hair in voluminous waves, seated on a throne-like gilded chair, shot on 35mm film, warm golden tones, magazine editorial quality, photorealistic, 8K, ultra-detailed skin texture",
          breakdown: { Style: "Hyper-realistic glamour portrait", Outfit: "Pink crystal ball gown", Lighting: "Hollywood / golden hour", Hair: "Voluminous platinum waves", Makeup: "Smoky eyes + gloss", Camera: "35mm film, editorial" }
        },
        {
          text: "Hyper-realistic photo of a stunning woman in a white fur stole over a jeweled bodysuit, surrounded by cascading pink roses, Vogue-style lighting, diamond tiara, long white gloves, Baroque interior setting, soft bokeh background, luxury fashion photography, photorealistic render, lifelike skin detail, 8K resolution",
          breakdown: { Style: "Vogue editorial, photorealistic", Outfit: "White fur + jeweled bodysuit", Setting: "Baroque interior", Props: "Pink roses, diamond tiara", Quality: "8K ultra-detail" }
        },
        {
          text: "Hyper-realistic photo of a woman dressed as modern royalty, wearing a sculptural couture gown in champagne and gold, Cartier diamond necklace, celestial backdrop of golden stars and moon, ethereal rim lighting, hair swept in an elegant updo with face-framing tendrils, Patrick Demarchelier-inspired aesthetic, timeless and opulent, photorealistic, ultra-sharp",
          breakdown: { Style: "Modern royalty, photorealistic", Outfit: "Champagne couture gown", Backdrop: "Celestial gold & stars", Lighting: "Ethereal rim lighting", Aesthetic: "Timeless luxury" }
        }
      ],

      party: [
        {
          text: "Hyper-realistic photo of a woman at a lavish 2000s nightclub, wearing a tiny pink sequin mini dress, dancing under disco lights and confetti, surrounded by paparazzi flashbulbs, champagne bottle with sparkler in hand, ecstatic expression, motion blur on background, electric party atmosphere, documentary-style flash photography, photorealistic, lifelike detail",
          breakdown: { Style: "Nightclub party, hyper-realistic", Outfit: "Pink sequin mini dress", Setting: "2000s nightclub", Lighting: "Disco + flash photography", Mood: "Electric, ecstatic" }
        },
        {
          text: "Hyper-realistic photo of a woman hosting a rooftop pool party in LA, pink rhinestone bikini, oversized Chanel sunglasses, poolside cabana, golden afternoon light, tiny chihuahua in arms, tropical flowers everywhere, influencer-era luxury aesthetic, lifestyle photography with film grain, photorealistic skin and fabric textures",
          breakdown: { Style: "LA pool party, hyper-realistic", Outfit: "Rhinestone pink bikini", Setting: "LA rooftop pool", Lighting: "Golden afternoon", Props: "Chihuahua, Chanel sunnies" }
        }
      ],

      fashion: [
        {
          text: "Hyper-realistic fashion photograph of a woman in avant-garde Valentino pink couture with exaggerated silhouette, stark white seamless studio backdrop, beauty dish lighting, high-fashion expression, razor-sharp styling, stiletto heels with ankle straps, ultra-high resolution fashion campaign aesthetic, photorealistic, every fabric thread visible, 8K",
          breakdown: { Style: "High fashion campaign, photorealistic", Outfit: "Valentino pink couture", Setting: "White seamless studio", Lighting: "Beauty dish", Quality: "8K, ultra-sharp" }
        },
        {
          text: "Hyper-realistic photo of a woman in a monochromatic all-white look — oversized structured blazer, wide-leg trousers, platform boots — striding through downtown Manhattan, overcast fashion week light, paparazzi-style street photography, effortlessly chic, film grain, candid motion, photorealistic detail",
          breakdown: { Style: "Street style, hyper-realistic", Outfit: "All-white structured look", Setting: "Manhattan streets", Lighting: "Overcast natural light", Vibe: "Candid, effortless" }
        }
      ],

      y2k: [
        {
          text: "Hyper-realistic photo recreating Y2K era aesthetic, woman wearing a velour baby pink Juicy Couture tracksuit, rhinestone accessories, Von Dutch trucker hat, oversized Louis Vuitton logo bag, Motorola Razr flip phone in hand, Beverly Hills backdrop, early 2000s digital camera look, slight overexposure, nostalgic Myspace-era energy, photorealistic",
          breakdown: { Style: "Y2K nostalgia, hyper-realistic", Outfit: "Pink velour Juicy tracksuit", Accessories: "Von Dutch, LV bag, Razr phone", Look: "Early 2000s digital camera aesthetic", Mood: "Nostalgic, Myspace era" }
        },
        {
          text: "Hyper-realistic paparazzi-style photo circa 2003, woman wearing low-rise jeans with rhinestone belt, belly-baring halter top, Ugg boots, chunky highlighted hair, waving outside a Hollywood nightclub, grainy tabloid photography aesthetic, warm film color grading, iconic early 2000s celebrity moment, photorealistic",
          breakdown: { Style: "2003 paparazzi moment, hyper-realistic", Outfit: "Low-rise jeans + halter top", Hair: "Chunky highlights", Look: "Tabloid grainy photography", Era: "Early 2000s Hollywood" }
        }
      ],

      editorial: [
        {
          text: "Hyper-realistic conceptual editorial photo, woman reimagined as a Baroque oil painting come to life, wearing a gold brocade corset and full skirt, candlelit Versailles setting, dramatic chiaroscuro lighting, velvet and pearls, museum-quality composition, anachronistic diamond iPhone as prop, tension between centuries, W Magazine aesthetic, photorealistic render",
          breakdown: { Style: "Baroque editorial, photorealistic", Outfit: "Gold brocade corset + skirt", Setting: "Versailles candlelit", Lighting: "Chiaroscuro dramatic", Concept: "Anachronistic luxury, W Magazine" }
        },
        {
          text: "Hyper-realistic dark glamour editorial photo, woman in black latex opera gloves and sculptural McQueen gown, subterranean stone castle location, single stark overhead spotlight, black roses scattered around, femme fatale expression, long dramatic shadows, high contrast black and white with pop of red lip, AnOther Magazine aesthetic, photorealistic",
          breakdown: { Style: "Dark glamour editorial, photorealistic", Outfit: "Black latex + McQueen gown", Setting: "Stone castle", Lighting: "Single overhead spotlight", Look: "High contrast B&W + red lip" }
        }
      ],

      luxury: [
        {
          text: "Hyper-realistic lifestyle photo inside a private jet, woman wearing a pale pink silk slip dress, Hermès Birkin in crocodile leather beside her, champagne flute in hand, cream leather seats, golden hour light streaming through oval window, understated affluence, quiet luxury aesthetic, Slim Aarons-inspired photography, photorealistic, 8K",
          breakdown: { Style: "Private jet quiet luxury, hyper-realistic", Outfit: "Pink silk slip dress", Props: "Hermès Birkin, champagne", Setting: "Private jet interior", Aesthetic: "Slim Aarons, old money" }
        },
        {
          text: "Hyper-realistic photo in Monaco, woman wearing a white linen blazer and wide-leg pants with Cartier jewelry, standing before a row of supercars in Cannes, golden hour sunlight with lens flare, casual billionaire energy, architectural Mediterranean background, European luxury vacation editorial, shot on Leica, photorealistic, ultra-sharp",
          breakdown: { Style: "Monaco luxury lifestyle, hyper-realistic", Outfit: "White linen + Cartier jewelry", Setting: "Cannes / supercars", Lighting: "Golden hour, lens flare", Camera: "Leica, editorial" }
        }
      ]

    };


    /* ============================================================
       APP LOGIC
    ============================================================ */

    /* ── State ──────────────────────────────────────────────── */
    let currentFilter     = 'all'; // active filter category
    let currentPromptText = '';    // last generated prompt (used for copy)

    /* ── DOM References ─────────────────────────────────────── */
    const promptCard  = document.getElementById('promptCard');
    const breakdown   = document.getElementById('breakdown');
    const copyBtn     = document.getElementById('copyBtn');
    const generateBtn = document.getElementById('generateBtn');
    const filterTags  = document.getElementById('filterTags');

    /* ── Filter Logic ───────────────────────────────────────── */

    // Returns all prompts flattened, or just the active category
    function getPromptPool() {
      if (currentFilter === 'all') return Object.values(PROMPTS).flat();
      return PROMPTS[currentFilter] ?? Object.values(PROMPTS).flat();
    }

    // Event delegation — one listener handles all tag clicks
    filterTags.addEventListener('click', (e) => {
      const tag = e.target.closest('.tag');
      if (!tag) return;
      filterTags.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      currentFilter = tag.dataset.filter;
    });

    /* ── Generation ─────────────────────────────────────────── */

    // Picks a random prompt from the pool and renders everything
    function generate() {
      const pool = getPromptPool();
      const item = pool[Math.floor(Math.random() * pool.length)];
      currentPromptText = item.text;
      renderPromptCard(item.text);
      renderBreakdown(item.breakdown);
      resetCopyButton();
    }

    // Injects prompt text into the card with an entrance animation
    function renderPromptCard(text) {
      promptCard.innerHTML = `<p class="prompt-text new-prompt">${text}</p>`;
    }

    // Builds the style breakdown key/value list
    function renderBreakdown(data) {
      let html = '<span class="breakdown-title">Prompt Breakdown</span>';
      for (const [key, value] of Object.entries(data)) {
        html += `<span class="breakdown-key">${key}</span>: ${value}<br>`;
      }
      breakdown.innerHTML = html;
      breakdown.style.display = 'block';
    }

    /* ── Copy to Clipboard ──────────────────────────────────── */

    function copyPrompt() {
      if (!currentPromptText) return;
      navigator.clipboard.writeText(currentPromptText).then(() => {
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(resetCopyButton, 2000);
      });
    }

    // Resets copy button to its default enabled state
    function resetCopyButton() {
      copyBtn.disabled = false;
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');
    }

    /* ── Event Listeners ────────────────────────────────────── */
    generateBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', copyPrompt);
  </script>

</body>
</html>
