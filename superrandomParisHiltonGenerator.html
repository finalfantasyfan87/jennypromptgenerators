<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glam Prompt Generator</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Didact+Gothic&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       STYLES
       1. CSS Variables
       2. Reset & Base
       3. Layout
       4. Typography
       5. Filter Tags
       6. Prompt Card
       7. Buttons
       8. Breakdown Panel
       9. Animations
    ============================================================ */


    /* ── 1. CSS Variables ─────────────────────────────────────── */
    :root {
      --pink:     #f472b6;
      --hot-pink: #ec4899;
      --blush:    #fce7f3;
      --gold:     #d4a843;
      --cream:    #fff9f5;
      --deep:     #1a0a10;
      --muted:    #d1b0be;
      --border:   #fce7f3;
    }


    /* ── 2. Reset & Base ──────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--cream);
      font-family: 'Didact Gothic', sans-serif;
      color: var(--deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Decorative radial gradient overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, #fce7f380 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, #fbcfe880 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }


    /* ── 3. Layout ────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .divider em {
      font-style: normal;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }


    /* ── 4. Typography ────────────────────────────────────────── */
    .crown {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--hot-pink);
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .tagline {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.5rem;
    }


    /* ── 5. Filter Tags ───────────────────────────────────────── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .tag {
      background: var(--blush);
      color: var(--hot-pink);
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
      user-select: none;
    }

    .tag:hover,
    .tag.active {
      background: var(--hot-pink);
      color: white;
    }


    /* ── 6. Prompt Card ───────────────────────────────────────── */
    .prompt-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 2rem 2.5rem;
      margin-bottom: 1.5rem;
      box-shadow:
        0 4px 30px rgba(244, 114, 182, 0.12),
        0 1px 0 rgba(212, 168, 67, 0.3) inset;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    /* Pink-to-gold gradient top border accent */
    .prompt-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--gold), var(--pink));
    }

    .prompt-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--deep);
      font-style: italic;
    }

    .placeholder-text {
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }


    /* ── 7. Buttons ───────────────────────────────────────────── */
    .generate-btn {
      background: linear-gradient(135deg, var(--hot-pink), #c026d3);
      color: white;
      border: none;
      padding: 1rem 3rem;
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 25px rgba(236, 72, 153, 0.4);
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(236, 72, 153, 0.5);
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .copy-btn {
      background: transparent;
      border: 1.5px solid var(--pink);
      color: var(--hot-pink);
      padding: 0.7rem 2rem;
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .copy-btn:hover    { background: var(--blush); }
    .copy-btn.copied   { border-color: var(--gold); color: var(--gold); }
    .copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }


    /* ── 8. Breakdown Panel ───────────────────────────────────── */
    .breakdown {
      display: none; /* shown via JS after first generate */
      text-align: left;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      font-size: 0.85rem;
      line-height: 2;
      color: #4a2030;
    }

    .breakdown-title {
      font-family: 'Playfair Display', serif;
      color: var(--hot-pink);
      font-size: 0.95rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .breakdown-key {
      color: var(--gold);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }


    /* ── 9. Animations ────────────────────────────────────────── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes shimmer {
      0%   { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .new-prompt { animation: shimmer 0.4s ease forwards; }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="crown">👑</div>
    <h1>Glam Prompt Generator</h1>
    <p class="tagline">That's hot. ✦ AI Photo Prompts</p>

    <!-- Filter tags — data-filter drives the JS logic -->
    <div class="tags" id="filterTags">
      <span class="tag active" data-filter="all">All Vibes</span>
      <span class="tag" data-filter="glam">Glam</span>
      <span class="tag" data-filter="party">Party</span>
      <span class="tag" data-filter="fashion">Fashion</span>
      <span class="tag" data-filter="y2k">Y2K</span>
      <span class="tag" data-filter="editorial">Editorial</span>
      <span class="tag" data-filter="luxury">Luxury</span>
    </div>

    <!-- Generated prompt display -->
    <div class="prompt-card" id="promptCard">
      <p class="placeholder-text">Hit generate for your first prompt ✨</p>
    </div>

    <!-- Action buttons -->
    <div class="buttons">
      <button class="generate-btn" id="generateBtn">✦ Generate Prompt</button>
      <button class="copy-btn" id="copyBtn" disabled>Copy</button>
    </div>

    <!-- Style breakdown -->
    <div class="divider">
      <span></span>
      <em>Style Breakdown</em>
      <span></span>
    </div>

    <div class="breakdown" id="breakdown"></div>

  </div>

  <script>
    /* ============================================================
       VIBE DESCRIPTIONS
       Used to guide Claude AI when generating prompts.
       Each key maps to a filter tag's data-filter value.
    ============================================================ */

    const VIBE_DESCRIPTIONS = {
      all:       'any glamorous vibe — glam, party, fashion, Y2K, editorial, or luxury',
      glam:      'ultra-glamorous, Hollywood golden era, couture gowns, diamonds, voluminous hair, magazine editorial',
      party:     'lavish 2000s nightclub or pool party, sequins, champagne, disco lights, paparazzi flashbulbs',
      fashion:   'high fashion campaign or street style, bold silhouettes, fashion week, designer pieces',
      y2k:       'Y2K nostalgia, Juicy Couture, Von Dutch, low-rise, rhinestones, early 2000s celebrity aesthetic',
      editorial: 'conceptual editorial, artistic, W Magazine or AnOther Magazine quality, avant-garde concept',
      luxury:    'quiet luxury, private jets, Monaco, old money, Slim Aarons aesthetic, understated opulence'
    };


    /* ============================================================
       APP LOGIC
    ============================================================ */

    /* ── State ──────────────────────────────────────────────── */
    let currentFilter     = 'all'; // active filter category
    let currentPromptText = '';    // last generated prompt (used for copy)
    let isLoading         = false; // prevents double-clicks during API call

    /* ── DOM References ─────────────────────────────────────── */
    const promptCard  = document.getElementById('promptCard');
    const breakdown   = document.getElementById('breakdown');
    const copyBtn     = document.getElementById('copyBtn');
    const generateBtn = document.getElementById('generateBtn');
    const filterTags  = document.getElementById('filterTags');

    /* ── Filter Logic ───────────────────────────────────────── */

    // Event delegation — one listener handles all tag clicks
    filterTags.addEventListener('click', (e) => {
      const tag = e.target.closest('.tag');
      if (!tag) return;
      filterTags.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      currentFilter = tag.dataset.filter;
    });

    /* ── AI Generation ──────────────────────────────────────── */

    // Calls the Claude API to generate a fresh, unique prompt
    async function generate() {
      if (isLoading) return;
      isLoading = true;

      // Show loading state
      generateBtn.textContent = '✦ Generating...';
      generateBtn.disabled = true;
      copyBtn.disabled = true;
      promptCard.innerHTML = `<p class="placeholder-text">Conjuring your prompt ✨</p>`;
      breakdown.style.display = 'none';

      const vibe = VIBE_DESCRIPTIONS[currentFilter];

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: `You are an expert AI image prompt writer specializing in glamorous, high-fashion photography.
You generate hyper-realistic photo prompts inspired by the aesthetic of early 2000s celebrity culture — think lavish, iconic, and unforgettable.
Every prompt must be unique and different from any previously generated prompt.
Always start prompts with "Hyper-realistic photo of a woman" — never reference any real person by name.
Return ONLY valid JSON with no markdown, no backticks, no extra text.`,
            messages: [{
              role: 'user',
              content: `Generate a single unique hyper-realistic AI photo prompt with the following vibe: ${vibe}.

The prompt should be vivid and detailed — describing outfit, setting, lighting, mood, camera style, and quality keywords like "photorealistic, 8K, ultra-detailed skin texture".

Also return a short style breakdown of 4–6 key elements from the prompt.

Return ONLY this JSON structure:
{
  "text": "the full prompt here",
  "breakdown": {
    "Style": "short description",
    "Outfit": "short description",
    "Setting": "short description",
    "Lighting": "short description",
    "Mood": "short description"
  }
}`
            }]
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        // Parse the JSON response from Claude
        const raw   = data.content.map(b => b.text || '').join('');
        const clean = raw.replace(/```json|```/g, '').trim();
        const item  = JSON.parse(clean);

        currentPromptText = item.text;
        renderPromptCard(item.text);
        renderBreakdown(item.breakdown);
        resetCopyButton();

      } catch (err) {
        // Show error in the card if something goes wrong
        promptCard.innerHTML = `<p class="placeholder-text" style="color:#e87070;">Something went wrong — please try again.</p>`;
        console.error('Claude API error:', err);
      } finally {
        // Always restore the generate button
        isLoading = false;
        generateBtn.textContent = '✦ Generate Prompt';
        generateBtn.disabled = false;
      }
    }

    // Injects prompt text into the card with an entrance animation
    function renderPromptCard(text) {
      promptCard.innerHTML = `<p class="prompt-text new-prompt">${text}</p>`;
    }

    // Builds the style breakdown key/value list
    function renderBreakdown(data) {
      let html = '<span class="breakdown-title">Prompt Breakdown</span>';
      for (const [key, value] of Object.entries(data)) {
        html += `<span class="breakdown-key">${key}</span>: ${value}<br>`;
      }
      breakdown.innerHTML = html;
      breakdown.style.display = 'block';
    }

    /* ── Copy to Clipboard ──────────────────────────────────── */

    function copyPrompt() {
      if (!currentPromptText) return;
      navigator.clipboard.writeText(currentPromptText).then(() => {
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(resetCopyButton, 2000);
      });
    }

    // Resets copy button to its default enabled state
    function resetCopyButton() {
      copyBtn.disabled = false;
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');
    }

    /* ── Event Listeners ────────────────────────────────────── */
    generateBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', copyPrompt);
  </script>

</body>
</html>
